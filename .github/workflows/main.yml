name: Run Postman API Collection

on:
  push:
    branches:
      - main  # Adjust to your main branch name
  workflow_dispatch:  # Allows manual trigger of the workflow

jobs:
  run-newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # Updated to the latest version

      - name: Set up Node.js
        uses: actions/setup-node@v5  # Updated to the latest version
        with:
          node-version: '20'  # Specify the Node.js version

      - name: Install Newman and HTMLExtra Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run Postman Collection
        run: newman run Assignment.postman_collection.json

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4  # Updated to the latest version
        with:
          name: newman-report
          path: ./reports/report.html



