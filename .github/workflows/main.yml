name: Run Postman API Collection

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'   # Runs every day at 9 AM Nigeria time
    - cron: '0 11 * * *'  # 12 PM Nigeria time
    - cron: '0 17 * * *'  # 6 PM Nigeria time

jobs:
  run-newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Newman locally
        run: npm install newman newman-reporter-htmlextra --save-dev

      - name: Create reports folder
        run: mkdir -p ./reports

      - name: Run postman-test
        run: npx newman run Assignment.postman_collection.json --env-var BaseUrl=https://api.restful-api.dev//collections/products/objects  --env-var x-api-key=c274a7b1-f06c-4425-a743-dc5cfa847932 --reporters htmlextra --reporter-htmlextra-export ./reports/report.html

      - name: Run JsonPlaceHolder-test
        run: npx newman run JsonPlaceHolder.postman_collection.json --env-var BaseUrl=https://jsonplaceholder.typicode.com
    
      - name: Upload HTML Report
        uses: actions/upload-artifact@v5
        with:
          name: newman-report
          path: ./reports/report.html

      - name: Upload HTML Report
        uses: actions/upload-artifact@v5
        with:
          name: JsonPlaceHolder-report
          path: ./reports/report.html
          



